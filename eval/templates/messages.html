
<section class="card chat-card">
    <div class="chat-header">
        <a class="link-back" href="/front/rooms?user_id={{ user.id }}">← rooms</a>
        <h2>#{{ room.name }}</h2>
        <span class="badge">{{ user.name }}</span>
    </div>

    <ul class="messages" id="messages-list">
        {% for m in messages %}
        <li id="message-{{ m.id }}"
            class="message {% if m.author_id == user.id %}mine{% endif %}">
            <div class="msg-author">{{ m.author_name }}</div>
            <div class="msg-content">{{ m.content }}</div>
            {% if m.author_id == user.id %}
            <button class="delete-button"
                    onclick="deleteMessage({{ m.id }})"
                    title="Delete">🗑</button>
            {% endif %}
        </li>
        {% endfor %}
    </ul>

    <form id="add-message-form"
          action="/api/messages"
          method="POST"
          data-current-user-id="{{ user.id }}"
          data-room-id="{{ room.id }}">
        <input type="hidden" name="author_id" value="{{ user.id }}">
        <input type="hidden" name="room_id" value="{{ room.id }}">
        <input type="text" name="content" placeholder="Write a message…"
               autocomplete="off" required>
        <button type="submit" class="btn btn-primary">Send</button>
    </form>
</section>

<script>
    window.APP_CONTEXT = {
        currentUserId: {{ user.id }},
        roomId: {{ room.id }},
        users: {{ users | tojson }}
    };
</script>

<script src="{{ url_for('static', path='/js/clientside-rendering.js') }}"></script>
<script src="{{ url_for('static', path='/js/update-backend.js') }}"></script>
<script src="{{ url_for('static', path='/js/forms-use-json.js') }}"></script>
<script src="{{ url_for('static', path='/js/ws-listener.js') }}"></script>
